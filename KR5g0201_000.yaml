front:
  text: 上清曲素訣辭籙集九
  hash: sha256:5be4c8b95b4af212fca1b38ad6141b816c03f241f91672f1557eed5c1c98fc57
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0201_HFL_000-001a, image: hfl/1046/1046-110.png}
body:
  text: 一名九天鳳炁玄丘大書太極左真人授太上授左真人以傳東海方諸宫青童大君使傳上士宿有玉名應爲神仙真人者佩之三十年得見三元君迎聖君扵上清金闕七百年聽傳二人齋中𧵥香一斤受畢喢血金絹之誓以代盟血登壇約訣辭曲素以威六天之鬼役衆精之神命五帝制五嶽符川澤召百鬼訣辭以攝名山之虎豹御百川之蛟龍使萬鬼驅萬邪巳上符並朱書𧵥盟訣白絹三十尺白絹以保血液之劵以代曲素之㰱血不齋不盛解籙素錦二十尺素錦以保神仙之劵以爲七百年三傳誓入疾入水入火入山室帶籙金鐶三𩀱金鐶以保長生大度劵以爲保心不滯之約道士無此文不得見三元君香用九兩香以保通靈之劵以爲𡨋靈之盟又無以招攝六天之鬼者也男受之北向師南向女受之南向師北向投書及祀當口傳扵師訣授時北向男授之十年又一齋投書女授之十年一祭籙酒脯列扵一座室之中請太清髙真景靈真人太上丈人宫奉戒如受者對籙口傳不用文扵𧵥絹鐶香誓身太清髙仙景雲真人啓天大籙太上丈人下受五嶽君佩之去禍除殃辟惡逐邪扞衆精徙百禽使鬼物延年十年還魂却老安身長存一名三天必生契九天丈人領白素玉女官十人布在弟子左右已上符除随筆冩定顔色外餘並係朱書九天鳳炁玄丘真書玄都丈人仙科授佩三日委以青帛鐶三𩀱香繒以盟授傳記太𡻕不慢不欺不惡不疾行仁累徳存神念真佩籙者神仙也豁落七元籙日景丹元黄書符月景黄元青書符嵗星朱書符熒惑黄書符太白黒書符辰星青書符鎭星朱書符朱符朱書符朱符朱書符黒符黒書符雌黄符黄書符右此一條掾𥁞自佩本以日月五星為七元其外復五符應是消魔經中符但消魔經凡有四十九符其經皆空䖏置而各有廣狹今此亦有數枚餘皆零落又一黄符其經云是真誥中所出云太極真人勑豐臺北帝符在玉馬經上者未詳審爾不然七元符傳世經中粗有施用法而今是佩本故無說謂冝且依真用雜色書雜綵上受而佩之勑豐臺一說符誥云凡盛此符以重紫之囊佩之於頭上矣上清十天召龍籙巳上符並朱書上清八威召龍籙維某年某月朔某日某州縣某宫觀受某法籙某岳真人姓名㳟詣上清大洞法師某君門下拜受上清迴車畢道玉清祕籙大洞真経等誓依玄科修行救人接物如違誓約甘受𡨋考以身謝天地水三官不敢怨恨急急如太上玄科律令巳上並朱書四時投山水簡立春甲寅立夏甲午立秋甲申立冬甲子巳上四符並青地朱欄朱書東方三十五海龍王奉迎南方三十五海龍王奉迎西方三十五海龍王奉迎巳上真文并符並朱書北方三十五海龍王奉迎維某年某月朔某日某州縣某宫觀授某法籙弟子某姓名謹詣上清大洞法師某君門下告盟奉授上清太玄河圗九星籙維某年某月朔某日某州縣某宫觀授某法籙某嶽真人某姓名㳟詣上清大洞法師某君門下拜授九星𨼆諱長生不死之符不得有違真科一如太上玄都律今陽明太尉府九百二十品九億萬諸靈官飛龍騎吏繡衣使者玉童玉女各九億萬人隂精上宰府五百五十品九億萬諸靈官飛龍騎吏繡衣使者玉童玉女各九億萬人真人司空府七百七十品九億萬諸靈官飛龍騎吏繡衣使者玉童玉女各九億萬人玄冥游擊府八百品九億萬諸靈官飛龍騎吏繡衣使者玉童玉女各九億萬人丹元斗君府七百二十品九億萬諸靈官飛龍騎吏繡衣使者金童玉女各九億萬人北極太常府七百四十品九億萬諸靈官飛龍騎吏繡衣使者金童玉女各九億萬人天關上帝府九百品九億萬諸靈官飛龍騎吏繡衣使者金童玉女各九億萬人輔天尊玉帝府九百九十品九億萬諸靈官飛龍騎吏繡衣使者金童玉女各九億萬人弼天帝真人府九百九十品九億萬諸靈官飛龍騎吏繡衣使者金童玉女各九億萬人符朱書上清紫紋交帶籙一曰廻車交帶亦謂畢道劵又云元始大劵九星内諱𨼆祕之名如左九星諱名並朱書第七之言天關真諱第六之言北極真諱第五之言丹元真諱第四之言玄真諱第三之言真人真諱第二之言隂精真諱第一之言陽明真諱右九皇内諱受者祕之真訣名口不傳九開星圖及歩時存思并晨起夕卧皆先叩齒九通隂咒星名第一太星精名玄樞𩓑弟子身得飛仙乗空駕浮第二元星精名北台𩓑弟子身得飛仙逰行洞室第三真星精名北極上真𩓑弟子身得飛仙得治三玄第四紐星精名旋根𩓑弟子身得玉名列為飛仙第五綱星精名天平𩓑弟子身得飛仙登行上清第六紀星精名命機𩓑弟子身得飛仙名書太㣲第七關星清名玄陽𩓑弟子身得飛仙得使玉童第八帝星精名髙上玉皇𩓑弟子身得飛仙登後聖之臺第九尊星精名太㣲帝君𩓑弟子身得飛仙名入丹瑶玉房右九祝畢又叩齒九通修行随意祕而慎之敬之勿妄傳之如法奉行真道自成矣太嵗保舉監度度師上清曲素訣辭籙
